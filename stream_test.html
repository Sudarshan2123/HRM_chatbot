<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HRMS AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; display: flex; height: 100vh; overflow: hidden; }

        /* ── Sidebar ── */
        #sidebar {
            width: 260px; min-width: 260px;
            background: #252526;
            border-right: 1px solid #444;
            display: flex; flex-direction: column;
        }
        #sidebar h3 { padding: 12px; font-size: 13px; color: #9cdcfe; border-bottom: 1px solid #444; }
        #sidebar button.new-chat {
            margin: 10px; padding: 8px;
            background: #0e639c; color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        #sidebar button.new-chat:hover { background: #1177bb; }
        #convList { flex: 1; overflow-y: auto; padding: 4px 0; }
        .conv-item {
            padding: 8px 12px; cursor: pointer; font-size: 11px;
            border-bottom: 1px solid #333; color: #ccc;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .conv-item:hover { background: #2a2d2e; }
        .conv-item.active { background: #094771; color: white; }
        .conv-item .conv-id { color: #888; font-size: 10px; }

        /* ── Main ── */
        #main { flex: 1; display: flex; flex-direction: column; padding: 16px; overflow: hidden; }
        #main h2 { font-size: 15px; margin-bottom: 10px; color: #9cdcfe; }
        #output {
            flex: 1; overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid #444;
            padding: 15px;
            background: #252526;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .msg-user    { color: #569cd6; }
        .msg-assistant { color: #9cdcfe; }
        .token       { color: #9cdcfe; }
        .tool        { color: #dcdcaa; }
        .done        { color: #4ec9b0; }
        .guard       { color: #ce9178; }
        .error       { color: #f44747; }
        .interrupt   { color: #ff9900; }

        #inputRow { display: flex; gap: 8px; }
        #msg { flex: 1; padding: 8px; background: #3c3c3c; border: 1px solid #555; color: white; border-radius: 4px; }
        button { padding: 8px 14px; background: #0e639c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1177bb; }

        #interruptPanel {
            display: none; margin-bottom: 10px; padding: 12px;
            background: #2d2d00; border: 1px solid #ff9900; border-radius: 4px;
        }
        #interruptPanel p { margin-bottom: 8px; color: #ff9900; font-size: 12px; }
        #interruptInput { flex: 1; padding: 8px; background: #3c3c3c; border: 1px solid #ff9900; color: white; border-radius: 4px; }
        #interruptRow { display: flex; gap: 8px; }
        #interruptSendBtn { background: #cc7700; }
        #interruptSendBtn:hover { background: #ff9900; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
    <h3>💬 Conversations</h3>
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div id="convList"><div style="padding:12px;color:#666;font-size:11px;">Loading...</div></div>
</div>

<!-- Main -->
<div id="main">
    <h2>HRMS AI Assistant &nbsp;<span id="threadLabel" style="font-size:11px;color:#666;"></span></h2>
    <div id="output">Start a conversation...</div>

    <div id="interruptPanel">
        <p id="interruptMsg">⚠ Awaiting your input:</p>
        <div id="interruptRow">
            <input id="interruptInput" type="text" placeholder="Type your response (e.g. yes / no)" />
            <button id="interruptSendBtn">Reply</button>
        </div>
    </div>

    <div id="inputRow">
        <input id="msg" type="text" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
        <button onclick="loadConversations()" style="background:#3c3c3c;">↻</button>
    </div>
</div>

<script>
    var threadId = "thread-" + Math.random().toString(36).slice(2);
    var output = document.getElementById("output");
    var interruptPanel = document.getElementById("interruptPanel");
    var interruptInput = document.getElementById("interruptInput");

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
    document.getElementById("msg").addEventListener("keydown", function(e) { if (e.key === "Enter") sendMessage(); });
    document.getElementById("interruptSendBtn").addEventListener("click", sendResume);
    interruptInput.addEventListener("keydown", function(e) { if (e.key === "Enter") sendResume(); });

    // ── Load conversation list from DB ──
    async function loadConversations() {
        try {
            var res = await fetch("/db/conversations");
            var data = await res.json();
            var list = document.getElementById("convList");
            if (!data.conversations || data.conversations.length === 0) {
                list.innerHTML = "<div style='padding:12px;color:#666;font-size:11px;'>No conversations yet</div>";
                return;
            }
            list.innerHTML = data.conversations.map(function(c) {
                return "<div class='conv-item" + (c.thread_id === threadId ? " active" : "") + "' onclick='loadThread(\"" + c.thread_id + "\")' title='" + c.thread_id + "'>" +
                    "<div>" + c.thread_id.slice(0, 28) + "...</div>" +
                    "<div class='conv-id'>checkpoints: " + c.total_checkpoints + "</div>" +
                "</div>";
            }).join("");
        } catch(e) {
            document.getElementById("convList").innerHTML = "<div style='padding:12px;color:#f44747;font-size:11px;'>Failed to load</div>";
        }
    }

    // ── Load a specific thread's history ──
    async function loadThread(tid) {
        threadId = tid;
        document.getElementById("threadLabel").textContent = "Thread: " + tid;
        hideInterrupt();

        // highlight active
        document.querySelectorAll(".conv-item").forEach(function(el) {
            el.classList.toggle("active", el.title === tid);
        });

        try {
            var res = await fetch("/db/conversation/" + tid);
            var data = await res.json();
            output.innerHTML = "";
            data.conversation.forEach(function(m) {
                if (m.role === "user") {
                    output.innerHTML += "<br><span class='msg-user'>You: " + escHtml(m.content) + "</span><br>";
                } else if (m.role === "assistant") {
                    output.innerHTML += "<span class='msg-assistant'>Assistant: " + escHtml(m.content) + "</span><br>";
                }
            });
            output.scrollTop = output.scrollHeight;
        } catch(e) {
            output.innerHTML = "<span class='error'>Failed to load thread: " + e.message + "</span>";
        }
    }

    function newChat() {
        threadId = "thread-" + Math.random().toString(36).slice(2);
        document.getElementById("threadLabel").textContent = "Thread: " + threadId;
        output.innerHTML = "Start a conversation...";
        hideInterrupt();
        document.querySelectorAll(".conv-item").forEach(function(el) { el.classList.remove("active"); });
    }

    function showInterrupt(msg) {
        document.getElementById("interruptMsg").textContent = "⚠ " + msg;
        interruptPanel.style.display = "block";
        interruptInput.value = "";
        interruptInput.focus();
    }

    function hideInterrupt() { interruptPanel.style.display = "none"; }

    async function sendResume() {
        var decision = interruptInput.value.trim();
        if (!decision) return;
        hideInterrupt();
        output.innerHTML += "<br><span class='msg-user'>You: " + escHtml(decision) + "</span><br>Assistant: ";
        try {
            var res = await fetch("/chat/resume", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ thread_id: threadId, decision: decision })
            });
            var data = await res.json();
            if (data.status === "waiting_for_input") {
                output.innerHTML += "<span class='interrupt'>" + escHtml(data.response) + "</span>";
                showInterrupt(data.response);
            } else {
                output.innerHTML += "<span class='msg-assistant'>" + escHtml(data.response) + "</span>";
            }
            output.innerHTML += "<br>";
            output.scrollTop = output.scrollHeight;
            loadConversations();
        } catch(err) {
            output.innerHTML += "<br><span class='error'>Resume failed: " + err.message + "</span><br>";
        }
    }

    async function sendMessage() {
        var msg = document.getElementById("msg").value.trim();
        if (!msg) return;
        document.getElementById("msg").value = "";
        output.innerHTML += "<br><span class='msg-user'>You: " + escHtml(msg) + "</span><br>Assistant: ";

        try {
            var res = await fetch("/chat/stream", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg, thread_id: threadId })
            });

            if (!res.ok) {
                var errText = await res.text();
                output.innerHTML += "<span class='error'>HTTP " + res.status + ": " + errText + "</span><br>";
                return;
            }

            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buffer = "";

            while (true) {
                var r = await reader.read();
                if (r.done) break;
                buffer += decoder.decode(r.value, { stream: true });
                var parts = buffer.split("\n\n");
                buffer = parts.pop();

                for (var i = 0; i < parts.length; i++) {
                    var line = parts[i].trim();
                    if (!line.startsWith("data: ")) continue;
                    try {
                        var evt = JSON.parse(line.slice(6));
                        if (evt.type === "token") {
                            output.innerHTML += "<span class='token'>" + escHtml(evt.content) + "</span>";
                        } else if (evt.type === "tool_start") {
                            output.innerHTML += "<br><span class='tool'>[tool] " + evt.tool + "...</span><br>";
                        } else if (evt.type === "tool_end") {
                            output.innerHTML += "<span class='tool'>[done] " + evt.tool + "</span><br>";
                        } else if (evt.type === "guardrail") {
                            output.innerHTML += "<span class='guard'>" + escHtml(evt.content) + "</span>";
                        } else if (evt.type === "interrupt") {
                            if (evt.thread_id) threadId = evt.thread_id;
                            output.innerHTML += "<br><span class='interrupt'>" + escHtml(evt.content) + "</span><br>";
                            showInterrupt(evt.content);
                        } else if (evt.type === "error") {
                            output.innerHTML += "<br><span class='error'>[error] " + escHtml(evt.content) + "</span><br>";
                        } else if (evt.type === "done") {
                            output.innerHTML += "<br>";
                            loadConversations();
                        }
                        output.scrollTop = output.scrollHeight;
                    } catch(parseErr) {}
                }
            }
        } catch(err) {
            output.innerHTML += "<br><span class='error'>Fetch failed: " + err.message + "</span><br>";
        }
    }

    function escHtml(str) {
        return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // Load on startup
    loadConversations();
    document.getElementById("threadLabel").textContent = "Thread: " + threadId;
</script>
</body>
</html>
